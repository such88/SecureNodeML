# firmware/stm32/prj.conf
# Zephyr Kconfig options for SecureInferNode
#
# Each CONFIG_xxx=y line turns a Zephyr subsystem ON.
# Without these, the relevant C code is NOT compiled in.
# Reference: docs.zephyrproject.org/latest/kconfig.html

# ── Console / Logging ─────────────────────────────────────────────────────
CONFIG_SERIAL=y
CONFIG_UART_CONSOLE=y
CONFIG_LOG=y
CONFIG_LOG_DEFAULT_LEVEL=3        # 0=off 1=err 2=warn 3=inf 4=dbg

# ── C++ support (needed for TFLite Micro .cc files) ──────────────────────
CONFIG_CPP=y
CONFIG_STD_CPP17=y
CONFIG_LIB_CPLUSPLUS=y

# ── mbedTLS: ECDSA P-256 + SHA-256 + SHA-384 ─────────────────────────────
# Required for: model_verify.c, spdm_responder.c, gateway_verify.c
CONFIG_MBEDTLS=y
CONFIG_MBEDTLS_BUILTIN=y
CONFIG_MBEDTLS_ECP_C=y
CONFIG_MBEDTLS_ECDSA_C=y
CONFIG_MBEDTLS_SHA256_C=y
CONFIG_MBEDTLS_SHA512_C=y                  # SHA-384 is SHA-512 truncated
CONFIG_MBEDTLS_ECP_DP_SECP256R1_ENABLED=y  # P-256 curve
CONFIG_MBEDTLS_ECP_DP_SECP384R1_ENABLED=y  # for SPDM measurement hash
CONFIG_MBEDTLS_HEAP_SIZE=16384             # 16KB heap for mbedTLS

# ── MPU / Userspace thread isolation ─────────────────────────────────────
# Required for: inference_thread.c running in K_USER mode
# Enables Cortex-M4 MPU enforcement of thread permissions
CONFIG_USERSPACE=y
CONFIG_MPU_STACK_GUARD=y
CONFIG_THREAD_STACK_INFO=y
CONFIG_THREAD_NAME=y

# ── Flash / NVS (anti-rollback version storage) ───────────────────────────
# Required for: version_check.c
CONFIG_FLASH=y
CONFIG_FLASH_PAGE_LAYOUT=y
CONFIG_FLASH_MAP=y
CONFIG_NVS=y
CONFIG_SETTINGS=y
CONFIG_SETTINGS_NVS=y

# ── CRC32 (OTA frame validation) ──────────────────────────────────────────
# Required for: ota_receiver.c
CONFIG_CRC=y

# ── Timing API (latency measurement) ─────────────────────────────────────
# Required for: k_cycle_get_32() in inference_thread.c
CONFIG_TIMING_FUNCTIONS=y

# ── Stack sizes ───────────────────────────────────────────────────────────
CONFIG_MAIN_STACK_SIZE=4096
CONFIG_SYSTEM_WORKQUEUE_STACK_SIZE=2048

# ── Heap (for mbedTLS dynamic allocation) ────────────────────────────────
CONFIG_HEAP_MEM_POOL_SIZE=32768   # 32KB system heap
